<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ตลาดหนังสือมือสอง - สตูลวิทยา</title>
  <style>
    :root {
      --primary-color: #0056b3;
      --bg-color: #f4f6f9;
      --accent-color: #28a745;
    }
    * { box-sizing: border-box; }
    body {
      font-family: 'Sarabun', 'Tahoma', sans-serif;
      margin: 0; padding: 0;
      background-color: var(--bg-color);
      color: #333;
    }
    header {
      background-color: var(--primary-color);
      color: white;
      padding: 1.5rem 1rem;
      text-align: center;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    .container { max-width: 1000px; margin: 20px auto; padding: 0 15px; }
    .action-bar { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
    .search-input {
      flex: 1; padding: 12px; border: 2px solid #e2e8f0;
      border-radius: 8px; font-size: 1rem; outline: none;
    }
    .btn-add {
      background-color: var(--primary-color); color: white;
      padding: 12px 20px; border-radius: 8px; text-decoration: none;
      font-weight: bold; display: inline-block; text-align: center;
    }
    .book-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 20px;
    }
    .book-card {
      background: white; border-radius: 12px; padding: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      display: flex; flex-direction: column; justify-content: space-between;
      overflow: hidden;
    }
    .book-img-container {
      width: 100%;
      height: 200px;
      background-color: #f0f0f0;
      border-radius: 8px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .book-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .no-img {
      color: #888;
      font-size: 0.9em;
    }
    .book-title { font-weight: bold; font-size: 1.1em; margin-bottom: 6px; }
    .book-tag {
      display: inline-block; background: #e9ecef; padding: 3px 10px;
      border-radius: 20px; font-size: 0.8em; color: #495057; margin-bottom: 10px;
    }
    .price { color: #e63946; font-size: 1.2em; font-weight: bold; margin-top: 10px; }
    .btn-contact {
      background-color: var(--accent-color); color: white; border: none;
      padding: 10px; border-radius: 6px; cursor: pointer; font-weight: bold;
      width: 100%; margin-top: 10px;
    }
  </style>
</head>
<body>

  <header>
    <h1>📚 SW Book2Hand</h1>
    <p>ตลาดส่งต่อหนังสือมือสอง โรงเรียนสตูลวิทยา</p>
  </header>

  <div class="container">
    <div class="action-bar">
      <input type="text" id="searchInput" class="search-input" onkeyup="filterBooks()" placeholder="ค้นหาชื่อหนังสือ, รายวิชา หรือระดับชั้น...">
      <!-- ลิงก์ไปยัง Google Form ของคุณ -->
      <a href="https://docs.google.com/forms/d/e/1FAIpQLScyyE10-SwP5qX3941NnJ2XW68/viewform" target="_blank" class="btn-add">➕ ลงขายหนังสือ</a>
    </div>

    <div class="book-grid" id="bookGrid">
      <p id="loading">กำลังโหลดข้อมูลหนังสือ...</p>
    </div>
  </div>

  <script>
    // ลิงก์ CSV จาก Google Sheets ของคุณ
    const csvUrl = 'https://docs.google.com/spreadsheets/d/1-Eu_7m_CrsOkqOjbP34rlR-o9kl8hphOFzDa7D_m8TQ/export?format=csv';

    // แปลงลิงก์รูป Google Drive ให้เป็นลิงก์ที่แสดงภาพบนเว็บได้
    function formatDriveUrl(url) {
      if (!url) return '';
      const match = url.match(/id=([a-zA-Z0-9_-]+)/) || url.match(/\/d\/([a-zA-Z0-9_-]+)/);
      if (match && match[1]) {
        return `https://lh3.googleusercontent.com/d/${match[1]}`;
      }
      return url;
    }

    async function loadBooks() {
      try {
        const response = await fetch(csvUrl);
        const data = await response.text();
        const rows = data.split('\n').slice(1); // ข้ามหัวข้อ
        const grid = document.getElementById('bookGrid');
        grid.innerHTML = '';

        let hasData = false;

        rows.forEach(row => {
          const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
          
          if (cols.length >= 5) {
            // ดึงข้อมูลตามลำดับคอลัมน์ใน Google Sheets
            const imgRaw = (cols[1] || '').replace(/^"|"$/g, '').trim();  // ข้อที่ 0. หน้าปกหนังสือ
            const title = (cols[2] || '').replace(/^"|"$/g, '').trim();   // ข้อที่ 1. ชื่อหนังสือ
            const tag = (cols[3] || '').replace(/^"|"$/g, '').trim();     // ข้อที่ 2. ระดับชั้น
            const detail = (cols[4] || '').replace(/^"|"$/g, '').trim();  // ข้อที่ 3. รายละเอียด
            const price = (cols[5] || '').replace(/^"|"$/g, '').trim();   // ข้อที่ 4. ราคา
            const contact = (cols[6] || '').replace(/^"|"$/g, '').trim(); // ข้อที่ 5. ช่องทางติดต่อ

            if (title) {
              hasData = true;
              const imgUrl = formatDriveUrl(imgRaw);
              const imgHTML = imgUrl 
                ? `<img src="${imgUrl}" class="book-img" alt="${title}" onerror="this.onerror=null; this.parentElement.innerHTML='<span class=\'no-img\'>📷 ไม่มีรูปภาพ</span>';">`
                : `<span class="no-img">📷 ไม่มีรูปภาพ</span>`;

              const card = document.createElement('div');
              card.className = 'book-card';
              card.innerHTML = `
                <div>
                  <div class="book-img-container">
                    ${imgHTML}
                  </div>
                  <span class="book-tag">${tag || 'ทั่วไป'}</span>
                  <div class="book-title">${title}</div>
                  <p style="font-size:0.9em; color:#666; margin:4px 0;">${detail}</p>
                </div>
                <div>
                  <div class="price">฿${price}</div>
                  <button class="btn-contact" onclick="alert('ช่องทางติดต่อ: ${contact}')">ทักแชตซื้อหนังสือ</button>
                </div>
              `;
              grid.appendChild(card);
            }
          }
        });

        if (!hasData) {
          grid.innerHTML = '<p style="grid-column: 1/-1; text-align: center;">ยังไม่มีรายการหนังสือที่ลงขายในขณะนี้</p>';
        }
      } catch (err) {
        document.getElementById('bookGrid').innerHTML = '<p style="grid-column: 1/-1; text-align: center;">ไม่สามารถโหลดข้อมูลได้ในขณะนี้</p>';
      }
    }

    function filterBooks() {
      const input = document.getElementById('searchInput').value.toLowerCase();
      const cards = document.getElementsByClassName('book-card');
      for (let i = 0; i < cards.length; i++) {
        const text = cards[i].innerText.toLowerCase();
        cards[i].style.display = text.includes(input) ? "" : "none";
      }
    }

    loadBooks();
  </script>
</body>
</html>
